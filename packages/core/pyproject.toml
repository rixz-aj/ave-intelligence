[project]
name = "ave-core"
version = "0.1.0"
description = "Shared library for Avé Intelligence: ingestion, data contracts, features, eval, export, lineage."
requires-python = ">=3.12"
dependencies = [
  "pandas>=2.2",
  "pandera>=0.20",
  "pydantic>=2.7",
  "pyarrow>=16",
  "requests>=2.32",
  "jsonschema>=4.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ave_core"]
