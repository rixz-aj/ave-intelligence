name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest

      # The public data contract: every artifact in published/ must validate
      # against published/meta/*.schema.json. See CONTRACT.md.
      - name: Validate published artifacts
        run: uv run python -m ave_core.export.validate published/
